<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamanwen</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#e8d5ff,#d6f0ff);
min-height:100vh;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
text-align:center;
margin-top:20px;
}

.logo h1{
font-size:40px;
color:#ff4f93;
}

.logo p{
color:#666;
}

.card{
background:white;
padding:20px;
border-radius:25px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.input{
width:100%;
padding:14px;
margin-top:10px;
border:2px solid #eee;
border-radius:12px;
outline:none;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
margin-top:15px;
background:#ff4f93;
color:white;
font-weight:600;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

footer{
text-align:center;
margin-top:30px;
color:#666;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>🎂 Mamanwen</h1>
<p>Buat Countdown Ulang Tahun Gemes</p>
</div>

<div class="card">

<input id="name" class="input" placeholder="Nama">

<input id="birthdate" class="input" type="date">

<input id="birthtime" class="input" type="time">

<textarea
id="message"
class="input"
placeholder="Ucapan Ulang Tahun"
rows="4"></textarea>

<input
id="photo"
class="input"
type="file"
accept="image/*">

<button class="btn" onclick="saveData()">
Simpan Countdown
</button>

</div>

</div>

<footer>
© 2026 Mamanwen - Made with ❤️
</footer>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA-elv5Q6AA__m7ByeGR6sZNx7NIg4j6q0",
authDomain: "mamanweb-2351f.firebaseapp.com",
projectId: "mamanweb-2351f",
storageBucket: "mamanweb-2351f.firebasestorage.app",
messagingSenderId: "472769825828",
appId: "1:472769825828:web:8ad8b6d91f91cea3fd1cb1",
measurementId: "G-YGKMDRG2B5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveData = async () => {

const name = document.getElementById("name").value;
const birthdate = document.getElementById("birthdate").value;
const birthtime = document.getElementById("birthtime").value;
const message = document.getElementById("message").value;

if(!name || !birthdate || !birthtime){
alert("Lengkapi data dulu");
return;
}

try{

const docRef = await addDoc(
collection(db,"birthdays"),
{
name,
birthdate,
birthtime,
message,
createdAt:serverTimestamp()
}
);

const link =
`${location.origin}/countdown.html?id=${docRef.id}`;

alert("Berhasil dibuat!\n\n"+link);

}catch(err){
alert(err.message);
}

};

</script>

</body>
</html>
